name: Build artifacts

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-cli:
    name: Build CLI executables
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 'latest'

      - name: Install CLI dependencies
        working-directory: cli
        run: bun install

      - name: Generate Prisma client
        working-directory: cli
        run: bunx prisma generate || true

      - name: Build CLI executable
        working-directory: cli
        shell: bash
        run: |
          case "$RUNNER_OS" in
            "Linux")   OUT="invoice-linux" ;;
            "macOS")   OUT="invoice-macos" ;;
            "Windows") OUT="invoice-win.exe" ;;
            *)         OUT="invoice" ;;
          esac
          bun build src/index.ts --compile --outfile "$OUT"

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.os }}
          path: cli/invoice*

  build-electron:
    name: Build Electron App
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate --workspace=@invoice/api

      - name: Build shared, API, and web packages
        run: |
          npm run build:shared
          npm run build:api
          npm run build:web

      - name: Build Electron TypeScript
        working-directory: packages/electron
        run: npm run build

      # wkhtmltopdf is an optional enhancement for PDF export. The app builds
      # and runs without it; PDF export falls back to pdfmake if unavailable.
      - name: Prepare wkhtmltopdf binary
        working-directory: packages/electron
        run: npm run prepare-wk || true

      - name: Package Electron app
        working-directory: packages/electron
        run: npm run package || echo "electron-builder failed; check logs"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.os }}
          path: packages/electron/release/**
